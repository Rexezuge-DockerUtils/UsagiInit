name: Docker Image CI

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set image name and tags
      id: vars
      run: |
        IMAGE_NAME=rexezugedockerutils/usagi-init
        GIT_SHA=${{ github.sha }}
        echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
        echo "commit_sha=${GIT_SHA}" >> "$GITHUB_OUTPUT"

    - name: Build and push multi-platform image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.commit_sha }}
          ${{ steps.vars.outputs.image_name }}:latest
