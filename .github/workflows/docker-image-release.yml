name: Docker Image Release CI

on:
  push:
    tags:
      - '*'

jobs:
  build-and-push:
    name: Release and Push
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Set Image Name and Tags
      id: vars
      run: |
        IMAGE_NAME=rexezugedockerutils/usagi-init
        TAG=${GITHUB_REF#refs/tags/}  # Extract tag name from git ref
        echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
        echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

    - name: Build and Push Multi-Platform Image
      uses: docker/build-push-action@v5
      with:
        context: .
        platforms: linux/amd64,linux/arm64
        push: true
        tags: |
          ${{ steps.vars.outputs.image_name }}:${{ steps.vars.outputs.tag }}
          ${{ steps.vars.outputs.image_name }}:release
